<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Monster Ultra White</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            /* Configuración del fondo */
            background-image: url('niggamap.jpg'); /* Asegúrate de que el nombre coincida con tu archivo */
            background-size: contain;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Capa opcional para mejorar legibilidad del fondo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); /* Aclara un poco la imagen */
            z-index: -1;
        }

        .main-layout {
    display: flex;
    align-items: center;
    justify-content: space-between; /* Esto empuja los elementos a los extremos */
    width: 90vw; /* Usa el 90% del ancho de la ventana */
    max-width: 1400px; 
    padding: 20px;
    z-index: 1;
}

        .side-img {
            width: 280px;
            height: auto;
            border-radius: 15px;
            filter: grayscale(20%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .calculator-card {
            background: rgba(255, 255, 255, 0.95); /* Fondo blanco con ligera transparencia */
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid #eaeaea;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); /* Efecto de desenfoque detrás de la tarjeta */
        }

        h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #000;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }

        .info-box {
            background-color: rgba(249, 249, 249, 0.8);
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-radius: 10px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #444;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            background: white;
        }

        button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border-radius: 10px;
        }

        button:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        #resultado {
            margin-top: 30px;
            text-align: left;
            border-top: 1px dashed #ccc;
            padding-top: 20px;
        }

        .res-item {
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .number-big {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

<div class="main-layout">
    <img src="monster_white.jpg" alt="Monster Ultra" class="side-img">

    <div class="calculator-card">
        <h1>¿Cuanta montel faltan pal jeldaive?</h1>
        
        <div class="info-box">
            Precio Latita: <strong>$2.88 USD ($4000)</strong><br> 
            Helldaiver: <strong>$39.99 USD</strong> (14 latita)
        </div>

        <label>¿Cuánta latita tenemo? (en dolale$$$)</label>
        <input type="number" id="usdInput" placeholder="Ej: 15.50" step="0.01">
        
        <button onclick="ejecutarCalculo()">Calculal</button>

        <div id="resultado"></div>
    </div>

    <img src="pharaoh.jpg" alt="Pharaoh" class="side-img">
</div>

<script>
    function ejecutarCalculo() {
        const PRECIO_LATA = 2.88;
        const META_TOTAL = 39.99;
        
        const usdIngresados = parseFloat(document.getElementById('usdInput').value);
        const display = document.getElementById('resultado');

        if (isNaN(usdIngresados) || usdIngresados < 0) {
            display.innerHTML = "<p style='color:red;'>Pone un numero válido papits</p>";
            return;
        }

        const latasTengo = (usdIngresados / PRECIO_LATA).toFixed(2);
        const dineroFaltante = META_TOTAL - usdIngresados;

        if (dineroFaltante <= 0) {
            display.innerHTML = `
                <div class="res-item">
                    ¡Ya tenemo jeldaiver!
                    <span class="number-big">${latasTengo} Latas</span>
                </div>`;
        } else {
            const latasFaltantes = Math.ceil(dineroFaltante / PRECIO_LATA);

            display.innerHTML = `
                <div class="res-item">
                    Tenemo:
                    <span class="number-big">${latasTengo} Latita</span>
                </div>
                <div class="res-item">
                    Faltan:
                    <span class="number-big" style="color: #d00;">${latasFaltantes} Latita</span>
                </div>
            `;
        }
    }
</script>

</body>
</html>
