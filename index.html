<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Tracker - Helldivers Edition</title>
    
    <link rel="icon" type="image/png" href="lol.ico">

    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('niggamap.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #ffffff;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.3); 
            z-index: -1;
        }

        .main-layout {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            width: 95vw; 
            max-width: 1600px; 
            padding: 20px;
            z-index: 1;
        }

        /* Contenedores de imágenes laterales */
        .side-container {
            width: 300px;
            text-align: center;
        }

        .side-content {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
        }

        /* Ocultar GIFs inicialmente */
        .hidden {
            display: none;
        }

        .calculator-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid #eaeaea;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }

        .progress-container {
            margin: 20px 0;
            text-align: left;
        }

        progress {
            width: 100%;
            height: 20px;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background-color: #eee;
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background-color: #39FF14; 
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        h1 { font-size: 1.3rem; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .info-box { background: rgba(240, 240, 240, 0.8); padding: 15px; margin-bottom: 20px; border-radius: 10px; font-size: 0.9rem; }
        input { width: 100%; 
    padding: 10px; /* Reducimos el padding para que no sea tan alta */
    margin-bottom: 20px; 
    border-radius: 10px; 
    border: 1px solid #ddd; 
    text-align: center; 
    font-size: 1rem; 
    /* Crucial para que el padding no "empuje" el ancho hacia afuera */
    box-sizing: border-box; }
        button#calc-btn { background: #000; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
        #resultado { margin-top: 20px; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div class="main-layout">
    <!-- Lado Izquierdo -->
    <div class="side-container">
        <img id="img-izq" src="monster_white.jpg" class="side-content">
        <img id="gif-izq" src="izquierda.gif" class="side-content hidden">
    </div>

    <div class="calculator-card">
        <h1>¿Cuanta montel faltan pal Helldive?</h1>
        <div class="info-box">
            Precio latita: <b>$2.88 USD ($4000)</b><br>
            Jeldaiver: <b>$39.99 USD</b>
        </div>

        <input type="number" id="usdInput" placeholder="¿Cuanta latita tenemo? (en dolale)" step="0.01">
        
        <button id="calc-btn" onclick="activarYCalcular()">Calcular Progreso</button>

        <div class="progress-container">
            <label id="progress-label" style="font-size: 0.8rem; color: #555;">Progreso: 0%</label>
            <progress id="monster-progress" value="0" max="39.99"></progress>
        </div>

        <div id="resultado"></div>
    </div>

    <!-- Lado Derecho -->
    <div class="side-container">
        <img id="img-der" src="pharaoh.jpg" class="side-content">
        <img id="gif-der" src="derecha.gif" class="side-content hidden">
    </div>
</div>

<script>
    const music = document.getElementById('bg-music');

    function activarYCalcular() {
        // 1. Activar Música
        music.play().catch(e => console.log("Música esperando interacción"));

        // 2. Intercambiar Fotos por GIFs
        document.getElementById('img-izq').classList.add('hidden');
        document.getElementById('img-der').classList.add('hidden');
        document.getElementById('gif-izq').classList.remove('hidden');
        document.getElementById('gif-der').classList.remove('hidden');

        // 3. Ejecutar Cálculo
        ejecutarCalculo();
    }

    function ejecutarCalculo() {
        const PRECIO = 2.88;
        const META = 39.99;
        const usd = parseFloat(document.getElementById('usdInput').value);
        const res = document.getElementById('resultado');
        const progressBar = document.getElementById('monster-progress');
        const progressLabel = document.getElementById('progress-label');

        if (isNaN(usd) || usd < 0) return;

        const progresoCerrado = Math.min(usd, META); 
        progressBar.value = progresoCerrado;
        const porcentaje = ((progresoCerrado / META) * 100).toFixed(0);
        progressLabel.innerText = `Progreso: ${porcentaje}%`;

        const tengo = (usd / PRECIO).toFixed(2);
        const faltan = Math.ceil((META - usd) / PRECIO);

        if (usd >= META) {
            res.innerHTML = `<h3 style="color: green;">¡DEMOCRACIA ALCANZADA!</h3>`;
        } else {
            res.innerHTML = `
                <div style="text-align: left; padding: 10px; background: #fff; border-radius: 10px; border: 1px solid #eee;">
                     <b>Estado:</b><br>
                    • Tenés: <b>${tengo}</b> latita.<br>
                    • Faltan: <b style="font-size:1.5rem; color:red;">${faltan}</b> latita.
                </div>
            `;
        }
    }
</script>
</body>
</html>
